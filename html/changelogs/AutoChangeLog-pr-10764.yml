author: "JohnFulpWillard"
delete-after: True
changes:
  - rscadd: "New sound channel called \"Sirens\", for the sound that plays during a Delta Alert."
  - rscdel: "The default announcer now has the default welcome message again, rather than being the same as the Ook announcer."
  - qol: "Station announcer has been moved to it's own pref called the Storyteller."
  - qol: "A lot more sounds now care for your volume slider settings, hopefully you wont get your ears blasted as much anymore."
  - balance: "Duke & Dagoth announcers have been halved in weight (so they are less likely to roll)."
  - rscdel: "Deleted several sound preferences that already exists as Volume Mixer options."
  - qol: "Elevator music is now a volume slider instead of ON/OFF setting."
  - bugfix: "Instrument volume sliders now work."
  - bugfix: "Whitenoise now takes prefs into account to decide sound volume."
  - bugfix: "Updating sound channels while a looping sound is playing will not stop the looping sound anymore."
  - bugfix: "'Stop all sounds' verb no longer removes whitenoise from the round until you enter & exit maints."
  - bugfix: "Looping sound effects now more consistently care for your volume prefs."