changes:
  - rscadd: "Added the explorer tab to the mining vendor."
  - rscadd: "Added the explorer voucher, and added it to the Explorer's backpack at round start."
  - rscadd: "Added 7 kits for the new explorer voucher. The laser gun kit, medevac kit, survival kit, breaching kit, bushman kit, explorer conscription kit and lavaland kit."
  - rscadd: "Added the explorer laser gun; a low capacity recharging laser gun. Sprite from TGMC."
  - rscadd: "Added breaching charges, a c-4 subtype for explorers which cannot be placed on station or on living things. Sprite by Chappy"
  - rscadd: "Added clown pranks with breaching charges. They also get them in the mail with rather low odds."
  - rscdel: "Removed the Explorer's mining voucher from their backpack at round start."
  - qol: "Mining hardsuits and other mining armor can hold the sledgehammer and explorer laser gun."